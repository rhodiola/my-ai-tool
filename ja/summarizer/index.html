<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>AI文章要約ツール</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6f8;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        h1 {
            margin-top: 0;
        }

        textarea {
            width: 100%;
            height: 220px;
            padding: 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
            box-sizing: border-box;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 14px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #1e4fd8;
        }

        .result {
            margin-top: 25px;
        }

        .result pre {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 4px;
            white-space: pre-wrap;
        }

        .counter {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>AI文章要約ツール</h1>

        <p>要約したい文章を入力してください（最大300文字）。</p>

        <textarea id="input" oninput="updateCounter()"></textarea>

        <div class="counter">
            <span id="count">0</span> / 300
        </div>

        <button onclick="summarize()">要約する</button>

        <div class="result">
            <h3>要約結果</h3>
            <pre id="result">ここに結果が表示されます</pre>
        </div>

    </div>

    <script>
        function updateCounter() {
            const text = document.getElementById("input").value
            document.getElementById("count").textContent = text.length
        }

        async function summarize() {
            const text = document.getElementById("input").value

            if (!text) {
                alert("文章を入力してください")
                return
            }

            if (text.length > 300) {
                alert("最大300文字までです")
                return
            }

            document.getElementById("result").textContent = "処理中..."

            const timestamp = Date.now()

            try {
                const res = await fetch("/api/summarize", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        text: text,
                        timestamp: timestamp
                    })
                })

                const data = await res.json()

                if (!res.ok) {
                    document.getElementById("result").textContent =
                        data.error || data.summary || `リクエスト失敗 (${res.status})`
                    return
                }

                if (data.summary) {
                    document.getElementById("result").textContent = data.summary
                } else {
                    document.getElementById("result").textContent = "要約に失敗しました"
                }
            } catch (e) {
                document.getElementById("result").textContent = "通信エラー"
            }
        }
    </script>

</body>

</html>
