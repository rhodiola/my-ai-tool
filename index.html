<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>AI要約ツール</title>
    <style>
        /* 入力エリアを大きくする */
        #userInput {
            width: 100%;
            height: 200px;
            font-size: 18px;
            padding: 10px;
        }

        /* ボタンを大きくする */
        button {
            font-size: 20px;
            padding: 10px 20px;
            margin: 10px 0;
        }

        /* 結果の文字を大きくする */
        #result {
            font-size: 18px;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <h1>AI要約ツール</h1>
    <textarea id="userInput" rows="5" cols="40" placeholder="要約したい文章を入力してください"></textarea>
    <br>
    <button onclick="summarizeText()">要約する</button>
    <p><strong>要約結果:</strong></p>
    <p id="result">ここに結果が表示されます</p>

    <script>
        async function summarizeText() {
            const input = document.getElementById('userInput').value;
            const result = document.getElementById('result');
            result.innerText = "要約中...";

            const response = await fetch('/api/summarize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: input })
            });
            const data = await response.json();
            result.innerText = data.summary;
        }
    </script>
</body>

</html>
