<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>AICSV Converter</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f3f4f6;
            font-size: 18px;
        }

        .wrapper {
            max-width: 950px;
            margin: 80px auto;
            text-align: center;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 18px;
        }

        .drop-area-container {
            display: flex;
            gap: 30px;
            justify-content: center;
        }

        .drop-area {
            width: 400px;
            height: 230px;
            border: 2px dashed #bbb;
            border-radius: 10px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .drop-title {
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 10px;
        }

        .drop-desc {
            font-size: 15px;
            color: #777;
        }

        .status {
            margin-top: 10px;
            font-size: 14px;
            color: #444;
        }

        .comment-box {
            margin-top: 35px;
        }

        .comment-box textarea {
            width: 600px;
            height: 60px;
            font-size: 16px;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 35px;
            padding: 14px 32px;
            font-size: 18px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            cursor: pointer;
        }

        button:disabled {
            background: #aaa;
            cursor: default;
        }

        input[type=file] {
            display: none;
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <h1>AICSV Converter</h1>

        <div class="subtitle">
            AIがCSV構造を解析し、データを変換します
        </div>

        <div class="drop-area-container">

            <div id="baseDrop" class="drop-area">
                <div class="drop-title">基礎CSV</div>
                <div class="drop-desc">ドロップ または クリックして選択</div>
                <div class="status" id="baseStatus">未読み込み</div>
                <input type="file" id="baseFile" accept=".csv">
            </div>

            <div id="convertDrop" class="drop-area">
                <div class="drop-title">変換CSV</div>
                <div class="drop-desc">ドロップ または クリックして選択</div>
                <div class="status" id="convertStatus">未読み込み</div>
                <input type="file" id="convertFile" accept=".csv">
            </div>

        </div>

        <div class="comment-box">
            <div style="margin-bottom:8px;">AIへ伝えるコメント（任意）</div>
            <textarea id="userComment" placeholder="例：列Aは商品コード、列Bは価格です"></textarea>
        </div>

        <button id="runBtn" disabled>
            AI変換CSVを生成
        </button>

    </div>

    <script>

        let baseCSV = ""
        let convertCSV = ""

        let baseLoaded = false
        let convertLoaded = false

        const runBtn = document.getElementById("runBtn")


        function parseLines(text) {
            return text
                .replace(/\r\n/g, "\n")
                .replace(/\r/g, "\n")
                .split("\n")
                .filter(line => line.trim() !== "")
        }


        /* CSVセル安全分割 */
        function splitCSVRow(row) {

            const result = []
            let current = ""
            let inQuotes = false

            for (let i = 0; i < row.length; i++) {

                const char = row[i]

                if (char === '"') {

                    if (inQuotes && row[i + 1] === '"') {
                        current += '"'
                        i++
                    } else {
                        inQuotes = !inQuotes
                    }

                } else if (char === ',' && !inQuotes) {

                    result.push(current)
                    current = ""

                } else {

                    current += char

                }
            }

            result.push(current)

            return result
        }


        async function readFile(file, callback) {

            try {

                const buffer = await file.arrayBuffer()
                let text = ""

                try {

                    const decoder = new TextDecoder("utf-8", { fatal: true })
                    text = decoder.decode(buffer)

                } catch {

                    const decoder = new TextDecoder("shift-jis")
                    text = decoder.decode(buffer)

                }

                callback(text, file.name)

            } catch (error) {

                alert("ファイルの読み込みに失敗しました: " + file.name)
                console.error(error)

            }

        }


        function updateRunButton() {
            runBtn.disabled = !(baseLoaded && convertLoaded)
        }


        function setupArea(dropId, fileId, callback) {

            const drop = document.getElementById(dropId)
            const fileInput = document.getElementById(fileId)

            drop.addEventListener("click", () => {
                fileInput.click()
            })

            fileInput.addEventListener("change", async () => {

                const file = fileInput.files[0]

                if (file) {
                    await readFile(file, callback)
                }

            })

            drop.addEventListener("dragover", e => {
                e.preventDefault()
            })

            drop.addEventListener("drop", async e => {

                e.preventDefault()

                const file = e.dataTransfer.files[0]

                if (file) {
                    await readFile(file, callback)
                }

            })

        }


        setupArea("baseDrop", "baseFile", (data, name) => {

            baseCSV = data
            baseLoaded = true

            document.getElementById("baseStatus").innerText = "Loaded: " + name

            updateRunButton()

            console.log("base loaded", name, baseCSV.length)

        })


        setupArea("convertDrop", "convertFile", (data, name) => {

            convertCSV = data
            convertLoaded = true

            document.getElementById("convertStatus").innerText = "Loaded: " + name

            updateRunButton()

            console.log("convert loaded", name, convertCSV.length)

        })


        runBtn.addEventListener("click", async () => {

            const comment = document.getElementById("userComment").value


            const baseRows = parseLines(baseCSV).map(r => splitCSVRow(r))
            const convertRows = parseLines(convertCSV).map(r => splitCSVRow(r))


            const baseHeader = baseRows[0]
            const baseSample = baseRows.slice(1, 4)

            const convertHeader = convertRows[0]
            const convertSample = convertRows.slice(1, 4)

            const convertAll = convertRows.slice(1)


            const res = await fetch("/api/aicsv-convert", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({

                    baseHeader,
                    baseSample,
                    convertHeader,
                    convertSample,
                    convertRows: convertAll,
                    comment,
                    timestamp: Date.now()

                })

            })


            const data = await res.json()


            if (!res.ok) {

                alert("Error: " + data.error)
                return

            }

            const blob = new Blob(["\uFEFF" + data.csv], { type: "text/csv;charset=utf-8" })
            const url = URL.createObjectURL(blob)

            const a = document.createElement("a")
            a.href = url
            a.download = "converted.csv"
            a.click()

        })


        updateRunButton()

    </script>

</body>

</html>
