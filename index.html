<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Tools</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6f8;
            margin: 0;
        }

        header {
            background: #2563eb;
            color: white;
            padding: 30px 0;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        .tools {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .tool {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .tool h3 {
            margin-top: 0;
        }

        .tool a {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 14px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }

        .tool a:hover {
            background: #1e4fd8;
        }

        .lang {
            text-align: center;
            margin-top: 20px;
        }

        .lang a {
            margin: 0 10px;
            text-decoration: none;
            color: #2563eb;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            color: #777;
            font-size: 14px;
        }
    </style>

</head>

<body>

    <header>
        <h1>AI Tools</h1>
        <p>Simple online tools powered by AI</p>
    </header>

    <div class="container">

        <div class="lang">
            <a href="/ja/">日本語</a> |
            <a href="/en/">English</a>
        </div>

        <h2>Tools</h2>

        <div class="tools">

            <div class="tool">
                <h3>Text Summarizer</h3>
                <p>Summarize long text into a short version.</p>
                <a href="/en/summarizer/">Open Tool</a>
            </div>

            <div class="tool">
                <h3>文章要約ツール</h3>
                <p>長い文章を短く要約します。</p>
                <a href="/ja/summarizer/">ツールを開く</a>
            </div>

        </div>

    </div>

    <footer>
        <p>© AI Tools</p>
    </footer>

</body>

</html>
