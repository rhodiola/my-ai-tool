<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Text Summarizer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6f8;
            margin: 0;
        }

        .container {
            max-width: 900px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        h1 {
            margin-top: 0;
        }

        textarea {
            width: 100%;
            height: 220px;
            padding: 12px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: vertical;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 14px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #1e4fd8;
        }

        .result {
            margin-top: 25px;
        }

        .result pre {
            background: #f3f4f6;
            padding: 15px;
            border-radius: 4px;
            white-space: pre-wrap;
        }

        .counter {
            font-size: 12px;
            color: #666;
            margin-top: 6px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>AI Text Summarizer</h1>

        <p>Enter the text you want to summarize (maximum 300 characters).</p>

        <textarea id="input" oninput="updateCounter()"></textarea>

        <div class="counter">
            <span id="count">0</span> / 300
        </div>

        <button onclick="summarize()">Summarize</button>

        <div class="result">

            <h3>Summary</h3>

            <pre id="result">The summary will appear here.</pre>

        </div>

    </div>

    <script>

        function updateCounter() {
            const text = document.getElementById("input").value
            document.getElementById("count").textContent = text.length
        }

        async function summarize() {

            const text = document.getElementById("input").value

            if (!text) {
                alert("Please enter text.")
                return
            }

            if (text.length > 2000) {
                alert("Maximum 2000 characters allowed.")
                return
            }

            document.getElementById("result").textContent = "Processing..."

            const res = await fetch("/api/summarize", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ text })
            })

            const data = await res.json()

            document.getElementById("result").textContent = data.summary
        }

    </script>

</body>

</html>
